services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: persona-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB_NAME: persona_dev
      LIQUIBASE_USER_PASSWORD_FILE: /run/secrets/liquibase_pw.txt
      DEV_USER_PASSWORD_FILE: /run/secrets/app_user_pw.txt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: